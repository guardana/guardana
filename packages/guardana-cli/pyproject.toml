[project]
name = "guardana-cli"
version = "0.1.1"
description = "Guardana command-line interface: scan, probe, monitor, init, rules, new-rule."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [
    { name = "Guardana contributors", email = "maintainers@guardana.io" },
]
maintainers = [
    { name = "Guardana contributors", email = "maintainers@guardana.io" },
]
keywords = ["ai-security", "llm", "prompt-injection", "security-scanner", "mlsecops"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "License :: OSI Approved :: Apache Software License",
    "Topic :: Security",
    "Intended Audience :: Developers",
    "Typing :: Typed",
]
dependencies = ["guardana-core>=0.1.1,<0.2", "guardana-rules>=0.1.1,<0.2", "guardana-report>=0.1.1,<0.2", "typer>=0.12"]

[project.urls]
Homepage = "https://guardana.io"
Repository = "https://github.com/guardana/guardana"
Documentation = "https://guardana.dev"
Issues = "https://github.com/guardana/guardana/issues"
Changelog = "https://github.com/guardana/guardana/blob/main/CHANGELOG.md"

[project.scripts]
guardana = "guardana.cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/guardana"]
