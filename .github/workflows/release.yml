# Publishes all five packages to PyPI on a version tag push (v0.1.0, v0.1.1, ...).
# The maintainer runbook for cutting a release is RELEASING.md; the one-time repo
# and PyPI setup is docs/maintainers/github-setup.md.
#
# Steady-state: this builds all five packages and uploads them via OIDC trusted
# publishing behind the "pypi" environment's approval gate — no API token in CI.
# Each of the 5 projects must have a trusted publisher pointed at this repo, this
# workflow file, and the "pypi" environment.
#
# NOTE on first-time setup: you cannot pre-register five *pending* publishers with
# this one shared (repo, workflow, environment) config — PyPI allows only one
# pending publisher per config. Bootstrap the projects once with a token upload,
# then add a normal trusted publisher to each. Full runbook + the one-time
# new-project rate-limit caveat: RELEASING.md. `skip-existing` below keeps re-runs
# idempotent.

name: Release

on:
  push:
    # Full version tags only (vX.Y.Z), so the moving major/minor tags used for the
    # Marketplace Action (v0.1, v1) don't re-trigger a publish when they move.
    tags: ["v*.*.*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Build all packages
        run: |
          mkdir -p dist
          for pkg in packages/*/; do
            uv build "$pkg" --out-dir dist/
          done

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # Idempotent re-runs: a version already on PyPI (e.g. bootstrapped by a
          # one-time token upload, or a re-tagged release) is skipped, not failed.
          skip-existing: true
