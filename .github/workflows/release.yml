# Publishes all five packages to PyPI on a version tag push (v0.1.0, v0.1.1, ...).
# The maintainer runbook for cutting a release is RELEASING.md; the one-time repo
# and PyPI setup is docs/maintainers/github-setup.md.
#
# Before the first release, a maintainer must create a PyPI *pending* Trusted
# Publisher for EACH of the 5 packages (guardana-core/-rules/-report/-cli/-server),
# pointed at this repo, this workflow file, and the "pypi" environment.
# See https://docs.pypi.org/trusted-publishers/creating-a-project-through-oidc/ —
# "pending" is what lets the first OIDC upload create a project that doesn't exist
# yet. Upload order is irrelevant (PyPI doesn't check a wheel's deps at upload).
#
# This builds all five and uploads them via OIDC trusted publishing — no API token
# is stored or needed. Full runbook: RELEASING.md.

name: Release

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Build all packages
        run: |
          mkdir -p dist
          for pkg in packages/*/; do
            uv build "$pkg" --out-dir dist/
          done

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # Idempotent re-runs: a version already on PyPI (e.g. bootstrapped by a
          # one-time token upload, or a re-tagged release) is skipped, not failed.
          skip-existing: true
