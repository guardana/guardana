name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --locked

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy --strict .

      - name: Architecture (the engine must never depend on the collector)
        run: uv run lint-imports

      - name: Tests + coverage gate
        run: uv run pytest --cov --cov-report=term-missing

      # We ship a supply-chain scanner; our own dependencies get the same scrutiny.
      - name: Dependency audit
        run: uv audit --preview-features audit

      # `scan .` would fail by design: examples/vulnerable-model is deliberately
      # malicious. Guardana scans its own source instead, and must stay clean.
      - name: Dogfood (Guardana scans its own source)
        run: uv run guardana scan packages

  example-plugin:
    # Proves the third-party extension story end-to-end: a package outside the
    # workspace registers rules through the `guardana.rules` entry point and is
    # discovered. Isolated on purpose — installing it into the main test env
    # would put `acme.*` rules into every discovery and skew the dogfood scan.
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Run the example plugin's own tests against an installed Guardana
        run: >
          uv run --isolated
          --with ./packages/guardana-core
          --with ./packages/guardana-rules
          --with ./examples/custom_rule
          --with pytest
          pytest examples/custom_rule/tests -q
